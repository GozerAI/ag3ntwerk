# Alembic Configuration for ag3ntwerk

[alembic]
# Path to migration environment
script_location = src/ag3ntwerk/persistence/migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path prepended to include src directory
prepend_sys_path = src

# Timezone for file generation timestamps (empty = localtime)
timezone = UTC

# Max length of characters in autogenerated revision slug
truncate_slug_length = 40

# Configures SQLAlchemy pool logging
# sqlalchemy.url is set programmatically in env.py based on environment
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Uncomment to run black on generated migrations
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
