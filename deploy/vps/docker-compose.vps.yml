# ag3ntwerk VPS Deployment (Hostinger / DigitalOcean / Hetzner / etc.)
# ==================================================================
#
# Minimal production stack for a single VPS with Caddy reverse proxy,
# automatic HTTPS, and the relay WebSocket tunnel for local fleet ops.
#
# Setup:
#   1. Copy .env.example to .env and fill in your values
#   2. Update Caddyfile with your domain
#   3. Run: docker-compose -f docker-compose.vps.yml up -d
#
# Architecture:
#   Internet --> Caddy (HTTPS :443) --> ag3ntwerk API (:3737)
#                                   --> WebSocket relay tunnel (/api/v1/fleet/ws/relay)
#   Your LAN --> relay-agent.py ---------> tunnel ------^

services:
  # ==========================================================================
  # Caddy - Automatic HTTPS reverse proxy
  # ==========================================================================
  caddy:
    image: caddy:2-alpine
    container_name: ag3ntwerk-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - ag3ntwerk
    restart: always
    networks:
      - ag3ntwerk-network

  # ==========================================================================
  # ag3ntwerk Core API
  # ==========================================================================
  ag3ntwerk:
    build:
      context: ../../
      target: production
    image: ag3ntwerk:${AGENTWERK_VERSION:-latest}
    container_name: ag3ntwerk-api
    expose:
      - "3737"
    environment:
      - AGENTWERK_ENV=production
      - AGENTWERK_HOST=0.0.0.0
      - AGENTWERK_PORT=3737
      - AGENTWERK_AUTH_REQUIRED=${AGENTWERK_AUTH_REQUIRED:-true}
      - DATABASE_BACKEND=${DATABASE_BACKEND:-postgresql}
      - PG_HOST=postgres
      - PG_PORT=5432
      - PG_DATABASE=${PG_DATABASE:-ag3ntwerk}
      - PG_USER=${PG_USER:-ag3ntwerk}
      - PG_PASSWORD=${PG_PASSWORD:?Set PG_PASSWORD in .env}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379
      - AGENTWERK_SECRETS_KEY=${AGENTWERK_SECRETS_KEY:?Set AGENTWERK_SECRETS_KEY in .env}
      - AGENTWERK_USE_MIGRATIONS=true
      # LLM providers (at least one recommended)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      # Relay configuration
      - AGENTWERK_WEBSOCKET_AUTH_ENABLED=true
    volumes:
      - ag3ntwerk-data:/app/data
      - ag3ntwerk-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3737/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - ag3ntwerk-network

  # ==========================================================================
  # PostgreSQL
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ag3ntwerk-postgres
    environment:
      - POSTGRES_DB=${PG_DATABASE:-ag3ntwerk}
      - POSTGRES_USER=${PG_USER:-ag3ntwerk}
      - POSTGRES_PASSWORD=${PG_PASSWORD:?Set PG_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-ag3ntwerk} -d ${PG_DATABASE:-ag3ntwerk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    networks:
      - ag3ntwerk-network

  # ==========================================================================
  # Redis
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: ag3ntwerk-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    networks:
      - ag3ntwerk-network

volumes:
  caddy-data:
  caddy-config:
  ag3ntwerk-data:
  ag3ntwerk-logs:
  postgres-data:
  redis-data:

networks:
  ag3ntwerk-network:
    driver: bridge
