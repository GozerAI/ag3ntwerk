apiVersion: v1
kind: ServiceAccount
metadata:
  name: ag3ntwerk
  namespace: ag3ntwerk
  labels:
    app.kubernetes.io/name: ag3ntwerk
---
# RBAC for reading ConfigMaps and Secrets (if needed for dynamic config)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ag3ntwerk
  namespace: ag3ntwerk
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["ag3ntwerk-config"]
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ag3ntwerk
  namespace: ag3ntwerk
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ag3ntwerk
subjects:
  - kind: ServiceAccount
    name: ag3ntwerk
    namespace: ag3ntwerk
