apiVersion: v1
kind: Service
metadata:
  name: ag3ntwerk
  namespace: ag3ntwerk
  labels:
    app.kubernetes.io/name: ag3ntwerk
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: ag3ntwerk
    app.kubernetes.io/component: api
---
# Headless service for direct pod access (useful for debugging)
apiVersion: v1
kind: Service
metadata:
  name: ag3ntwerk-headless
  namespace: ag3ntwerk
  labels:
    app.kubernetes.io/name: ag3ntwerk
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 3737
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: ag3ntwerk
    app.kubernetes.io/component: api
