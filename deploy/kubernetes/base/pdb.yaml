apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ag3ntwerk
  namespace: ag3ntwerk
  labels:
    app.kubernetes.io/name: ag3ntwerk
    app.kubernetes.io/component: api
spec:
  # Ensure at least 1 pod is always available during voluntary disruptions
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ag3ntwerk
      app.kubernetes.io/component: api
