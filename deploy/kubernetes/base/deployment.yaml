apiVersion: apps/v1
kind: Deployment
metadata:
  name: ag3ntwerk
  namespace: ag3ntwerk
  labels:
    app.kubernetes.io/name: ag3ntwerk
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ag3ntwerk
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ag3ntwerk
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3737"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: ag3ntwerk
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # Anti-affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: ag3ntwerk
                topologyKey: kubernetes.io/hostname

      containers:
        - name: ag3ntwerk
          image: ag3ntwerk:0.1.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 3737
              protocol: TCP

          envFrom:
            - configMapRef:
                name: ag3ntwerk-config
            - secretRef:
                name: ag3ntwerk-secrets

          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 30

      volumes:
        - name: data
          emptyDir: {}  # Ephemeral cache only — persistent state uses PostgreSQL
        - name: tmp
          emptyDir: {}

      terminationGracePeriodSeconds: 30
