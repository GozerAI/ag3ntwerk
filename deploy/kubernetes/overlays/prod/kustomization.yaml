apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ag3ntwerk

resources:
  - ../../base

labels:
  - pairs:
      environment: production

patches:
  # Production replicas
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: ag3ntwerk

  # Higher resource limits for production
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi
    target:
      kind: Deployment
      name: ag3ntwerk

  # Production HPA settings
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
    target:
      kind: HorizontalPodAutoscaler
      name: ag3ntwerk

  # Higher PDB for production
  - patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2
    target:
      kind: PodDisruptionBudget
      name: ag3ntwerk

configMapGenerator:
  - name: ag3ntwerk-config
    behavior: merge
    literals:
      - AGENTWERK_ENV=production
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
