apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ag3ntwerk-dev

resources:
  - ../../base

nameSuffix: -dev

labels:
  - pairs:
      environment: development

patches:
  # Reduce replicas for dev
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: ag3ntwerk

  # Reduce resource limits for dev
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
    target:
      kind: Deployment
      name: ag3ntwerk

  # Adjust HPA for dev
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
    target:
      kind: HorizontalPodAutoscaler
      name: ag3ntwerk

configMapGenerator:
  - name: ag3ntwerk-config
    behavior: merge
    literals:
      - AGENTWERK_ENV=development
      - LOG_LEVEL=DEBUG
