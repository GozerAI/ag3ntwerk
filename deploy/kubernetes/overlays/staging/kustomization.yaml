apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ag3ntwerk-staging

resources:
  - ../../base

nameSuffix: -staging

labels:
  - pairs:
      environment: staging

patches:
  # Use 2 replicas for staging
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: ag3ntwerk

configMapGenerator:
  - name: ag3ntwerk-config
    behavior: merge
    literals:
      - AGENTWERK_ENV=staging
      - LOG_LEVEL=INFO
