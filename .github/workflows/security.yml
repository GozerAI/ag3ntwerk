# ag3ntwerk Security Scanning Pipeline
# ====================================
# Runs security checks on code and dependencies

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 9am UTC
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety pip-audit

      - name: Create requirements file
        run: |
          pip install -e ".[dev,distributed]"
          pip freeze > requirements-frozen.txt

      - name: Run Safety check
        id: safety-check
        continue-on-error: true
        run: |
          safety check -r requirements-frozen.txt --output json > safety-report.json
          cat safety-report.json

      - name: Run pip-audit
        id: pip-audit-check
        continue-on-error: true
        run: |
          pip-audit --format json --output pip-audit-report.json
          cat pip-audit-report.json

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            safety-report.json
            pip-audit-report.json

      - name: Check scan results
        if: steps.safety-check.outcome == 'failure' || steps.pip-audit-check.outcome == 'failure'
        run: |
          echo "::warning::Security scan detected vulnerabilities. Check uploaded reports."
          exit 1

  code-scan:
    name: Static Code Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: |
          pip install bandit[toml]

      - name: Run Bandit security scan
        id: bandit-scan
        continue-on-error: true
        run: |
          bandit -r src/ag3ntwerk/ -f json -o bandit-report.json --severity-level medium
          bandit -r src/ag3ntwerk/ -f txt --severity-level medium

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Check scan results
        if: steps.bandit-scan.outcome == 'failure'
        run: |
          echo "::warning::Bandit detected security issues. Check uploaded report."
          exit 1

  secret-scan:
    name: Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for secret scanning

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    # Only run on main branch pushes or when container changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: false
          load: true
          tags: ag3ntwerk:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'ag3ntwerk:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
